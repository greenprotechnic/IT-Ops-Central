<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Ops Central | Systems Launcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glow-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(56, 189, 248, 0.07) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        .system-title {
            background: linear-gradient(90deg, #f8fafc, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Loading Overlay Style */
        .loading-active {
            opacity: 0.6;
            pointer-events: none;
            filter: grayscale(0.5);
        }
    </style>
</head>
<body class="p-6">
    <div class="glow-bg"></div>

    <div class="container max-w-6xl mx-auto">
        <div class="text-center mb-16 animate__animated animate__fadeIn">
            <h1 class="text-4xl font-bold tracking-tighter system-title mb-2">IT-OPS CENTRAL</h1>
            <p class="text-slate-500 text-sm uppercase tracking-[0.3em]">System Gateway</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 animate__animated animate__fadeInUp">
            
            <div onclick="launch('repo/pc.html', this)" class="glass-card p-10 rounded-[2.5rem] flex flex-col items-center text-center group cursor-pointer">
                <div class="w-20 h-20 bg-sky-500/10 rounded-3xl flex items-center justify-center mb-8 group-hover:bg-sky-500/20 group-hover:scale-110 transition-all duration-500">
                    <i data-lucide="bar-chart-3" class="text-sky-400 w-10 h-10"></i>
                </div>
                <h2 class="text-3xl font-bold mb-4">IT-PC</h2>
                <p class="text-slate-400 text-sm mb-8 leading-relaxed">Procurement Comparison & Analysis</p>
                <button class="btn-launch btn btn-md btn-block bg-sky-500 hover:bg-sky-400 text-white border-none rounded-2xl shadow-lg shadow-sky-500/20">
                    Launch
                </button>
            </div>

            <div onclick="launch('repo/nsc.html', this)" class="glass-card p-10 rounded-[2.5rem] flex flex-col items-center text-center group cursor-pointer">
                <div class="w-20 h-20 bg-emerald-500/10 rounded-3xl flex items-center justify-center mb-8 group-hover:bg-emerald-500/20 group-hover:scale-110 transition-all duration-500">
                    <i data-lucide="user-plus" class="text-emerald-400 w-10 h-10"></i>
                </div>
                <h2 class="text-3xl font-bold mb-4">IT-NSC</h2>
                <p class="text-slate-400 text-sm mb-8 leading-relaxed">New Staff Onboarding Checklist</p>
                <button class="btn-launch btn btn-md btn-block bg-emerald-500 hover:bg-emerald-400 text-white border-none rounded-2xl shadow-lg shadow-emerald-500/20">
                    Launch
                </button>
            </div>

            <div onclick="launch('repo/rsc.html', this)" class="glass-card p-10 rounded-[2.5rem] flex flex-col items-center text-center group cursor-pointer">
                <div class="w-20 h-20 bg-rose-500/10 rounded-3xl flex items-center justify-center mb-8 group-hover:bg-rose-500/20 group-hover:scale-110 transition-all duration-500">
                    <i data-lucide="user-minus" class="text-rose-400 w-10 h-10"></i>
                </div>
                <h2 class="text-3xl font-bold mb-4">IT-RSC</h2>
                <p class="text-slate-400 text-sm mb-8 leading-relaxed">Resigned Staff Offboarding Checklist</p>
                <button class="btn-launch btn btn-md btn-block bg-rose-500 hover:bg-rose-400 text-white border-none rounded-2xl shadow-lg shadow-rose-500/20">
                    Launch
                </button>
            </div>

        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        /**
         * Handles the redirection with a loading effect
         * @param {string} url - The destination path in the repo folder
         * @param {HTMLElement} card - The clicked card element
         */
        function launch(url, card) {
            const btn = card.querySelector('.btn-launch');
            
            // 1. Visual Loading State
            card.classList.add('loading-active');
            btn.innerHTML = '<span class="loading loading-spinner loading-sm"></span> Initializing...';
            
            // 2. Artificial delay to show the loading effect
            setTimeout(() => {
                window.location.href = url;
            }, 800);
        }
    </script>
</body>
</html>
